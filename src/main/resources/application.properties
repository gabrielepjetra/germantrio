spring.application.name=germantrio
spring.datasource.url=jdbc:h2:mem:germantrio
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=3MB
supabase.s3.endpoint=${SUPABASE_S3_ENDPOINT:}
supabase.s3.region=${SUPABASE_S3_REGION:}
supabase.s3.access-key=${SUPABASE_S3_ACCESS_KEY:}
supabase.s3.secret-key=${SUPABASE_S3_SECRET_KEY:}
supabase.bucket-name=${SUPABASE_BUCKET_NAME:}
supabase.public-bucket-url=${SUPABASE_PUBLIC_BUCKET_URL:}
