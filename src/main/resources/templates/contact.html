<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments :: head('Contact - The German Trio')}"></head>

<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{fragments :: navbar}"></nav>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">

            <h2 class="text-custom fw-bold mb-4 text-center">Contact Me</h2>
            <p class="text-dark-gray text-center mb-4">Send me a message and I will get back to you as soon as
                possible.</p>

            <form th:action="@{/contact}" method="post" class="card p-4 shadow-sm bg-card">
                <div class="mb-3">
                    <label for="name" class="form-label">Name<span class="text-danger fw-bold">*</span></label>
                    <input type="text" class="form-control" id="name" name="name" placeholder="Your name" required>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">Email<span class="text-danger fw-bold">*</span></label>
                    <input type="email" class="form-control" id="email" name="email" placeholder="you@example.com"
                           required>
                </div>

                <div class="mb-3">
                    <label for="message" class="form-label">Message<span class="text-danger fw-bold">*</span></label>
                    <textarea class="form-control" id="message" name="message" rows="5"
                              placeholder="Write your message here..." required></textarea>
                </div>

                <div class="d-flex justify-content-between">
                    <button type="submit" class="btn btn-outline-dark w-50">Send</button>
                    <a th:href="@{/about}" class="btn btn-outline-dark w-50 ms-2">Cancel</a>
                </div>
            </form>

        </div>
    </div>
</main>
<footer th:replace="~{fragments :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
