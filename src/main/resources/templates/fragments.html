<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:fragment="head(title)">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title}">The German Trio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" defer></script>
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>

<body>

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-custom sticky-top shadow-sm">
    <div class="container-fluid px-3 px-lg-5">
        <a class="navbar-brand fw-bold" th:href="@{/}">TGT</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto py-3">
                <li class="nav-item py-2">
                    <a class="nav-link" th:href="@{/}"
                       th:classappend="${currentUrl == '/'} ? 'active'">Home</a>
                </li>

                <li class="nav-item py-2">
                    <a class="nav-link" th:href="@{/compare}"
                       th:classappend="${currentUrl == '/compare'} ? 'active'">Compare</a>
                </li>

                <li class="nav-item py-2">
                    <a class="nav-link" th:href="@{/contact}"
                       th:classappend="${currentUrl == '/contact'} ? 'active'">Contact</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<footer th:fragment="footer" class="bg-custom text-white py-4 mt-auto">
    <div class="container text-center">
        <p class="mb-1 fw-bold">The German Trio</p>
    </div>
</footer>

</body>
</html>
