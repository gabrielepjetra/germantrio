<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Brands - The German Trio')}"></head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{fragments :: navbar}"></nav>

<main class="container py-5 flex-grow-1">
  <h2 class="text-center fw-bold text-custom mb-5">German Automotive Brands</h2>

  <div th:each="brand : ${brands}" class="row mb-4">
    <div class="col-12 col-md-10 col-lg-8 mx-auto">
      <div class="card h-100 shadow-sm text-center">
        <img th:src="${brand.imgUrl}" class="card-img-top p-4" th:alt="${brand.name} + ' logo'" style="max-height: 160px; object-fit: contain;">
        <div class="card-body d-flex flex-column">
          <h5 class="card-title fw-bold" th:text="${brand.name}"></h5>
          <p class="card-text" th:text="${brand.longDescription}"></p>
          <p class="fw-semibold mt-auto">Flagship Model: <span th:text="${brand.flagship}"></span></p>
          <a th:href="@{|/brands/${brand.id}|}" class="btn btn-outline-dark w-100 mt-3">Discover <span th:text="${brand.name}"></span></a>
        </div>
      </div>
    </div>
  </div>

</main>

<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
