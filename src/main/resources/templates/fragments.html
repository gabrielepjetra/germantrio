<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:fragment="head(title)">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title}">The German Trio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" defer></script>
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>

<body>

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-custom sticky-top shadow-sm">
    <div class="container-fluid px-3 px-lg-5">
        <a class="navbar-brand fw-bold" th:href="@{/}">TGT</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto py-3">
                <li class="nav-item py-2">
                    <a class="nav-link" th:href="@{/}"
                       th:classappend="${currentUrl == '/'} ? 'active'">Home</a>
                </li>

                <li class="nav-item py-2">
                    <a class="nav-link" th:href="@{/compare}"
                       th:classappend="${currentUrl == '/compare'} ? 'active'">Compare</a>
                </li>

                <li class="nav-item py-2">
                    <a class="nav-link" th:href="@{/about}"
                       th:classappend="${currentUrl == '/about'} ? 'active'">About</a>
                </li>

                <li class="nav-item py-2 mx-2" sec:authorize="!isAuthenticated()">
                    <a class="nav-auth-button" th:href="@{/login}">Login</a>
                </li>

                <li class="nav-item py-2 ms-2" sec:authorize="!isAuthenticated()">
                    <a class="nav-auth-button" th:href="@{/register}">Register</a>
                </li>

                <li class="nav-item py-2" sec:authorize="isAuthenticated()">
                    <a class="nav-link" th:href="@{/profile}"
                       th:classappend="${currentUrl == '/profile'} ? 'active'">Profile</a>
                </li>

                <li class="nav-item py-2 ms-2" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-auth-button" th:href="@{/admin}">Admin</a>
                </li>

                <li class="nav-item py-2 ms-2"
                    sec:authorize="isAuthenticated()">
                    <a class="nav-notification-button" th:href="@{/notifications}">
                        <img th:src="${hasUnreadNotifications} ? @{/foto/icons/notification-alert-icon.png} : @{/foto/icons/notification-bell-icon.png}"
                             th:alt="${hasUnreadNotifications} ? 'Unread notifications' : 'Notifications'">
                        <span th:if="${hasUnreadNotifications}"
                              class="nav-notification-badge"
                              th:text="${unreadNotificationCount}">0</span>
                    </a>
                </li>

                <li class="nav-item py-2 ms-2" sec:authorize="isAuthenticated()">
                    <form th:action="@{/logout}" method="post" class="m-0">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" class="nav-auth-button nav-logout-button">Logout</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<footer th:fragment="footer" class="bg-custom text-white py-4 mt-auto">
    <div class="container text-center">
        <p class="mb-1 fw-bold">The German Trio</p>
    </div>
</footer>

</body>
</html>
