<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-custom sticky-top shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">TGT</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto py-3">
          <li class="nav-item py-2"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item py-2"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item py-2"><a class="nav-link" href="brands.html">Brands</a></li>
          <li class="nav-item py-2"><a class="nav-link" href="compare.html">Compare</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-6">

        <h2 class="text-custom fw-bold mb-4 text-center">Contact Me</h2>
        <p class="text-dark-gray text-center mb-4">Send me a message and I will get back to you as soon as possible.</p>

        <form action="mailform.php" method="post" class="card p-4 shadow-sm bg-card">
          <div class="mb-3">
            <label for="name" class="form-label">Name<span class="text-danger fw-bold">*</span></label>
            <input type="text" class="form-control" id="name" name="name" placeholder="Your name" required>
          </div>

          <div class="mb-3">
            <label for="email" class="form-label">Email<span class="text-danger fw-bold">*</span></label>
            <input type="email" class="form-control" id="email" name="email" placeholder="you@example.com" required>
          </div>

          <div class="mb-3">
            <label for="message" class="form-label">Message<span class="text-danger fw-bold">*</span></label>
            <textarea class="form-control" id="message" name="message" rows="5" placeholder="Write your message here..." required></textarea>
          </div>

          <div class="d-flex justify-content-between">
            <button type="submit" class="btn btn-outline-dark w-50">Send</button>
            <a href="about.html" class="btn btn-outline-dark w-50 ms-2">Cancel</a>
          </div>
        </form>

      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
