<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments :: head('Login - The German Trio')}"></head>

<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{fragments :: navbar}"></nav>

<main class="container py-5 flex-grow-1">
    <section class="auth-panel auth-panel-narrow mx-auto">
        <div class="auth-header text-center">
            <p class="brand-detail-label mb-2">Welcome Back</p>
            <h1>Log in</h1>
            <p>Access your profile and saved models.</p>
        </div>

        <div th:if="${param.error != null}" class="alert alert-danger">
            Login failed. Please check your email and password.
        </div>

        <div th:if="${param.logout != null}" class="alert alert-info">
            You have been logged out.
        </div>

        <div th:if="${param.registered != null}" class="alert alert-success">
            Registration was successful. You can now log in.
        </div>

        <form th:action="@{/login}" method="post" class="auth-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="auth-grid auth-grid-single">
                <div class="auth-field">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" class="form-control" required>
                </div>

                <div class="auth-field">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control" required>
                </div>
            </div>

            <button type="submit" class="btn btn-outline-dark auth-submit">Log in</button>
        </form>

        <div class="auth-links">
            <a href="#">Forgot your password?</a>
            <span></span>
            <a th:href="@{/register}">Create an account</a>
        </div>
    </section>
</main>

<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
