<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments :: head('Car Model Form - The German Trio')}"></head>

<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{fragments :: navbar}"></nav>

<main class="container py-5 flex-grow-1">
    <section class="admin-form-page mx-auto">
        <div class="admin-page-header">
            <a th:href="@{/admin/carmodels}" class="btn btn-outline-dark">&larr; Back to Models</a>
            <div>
                <p class="brand-detail-label mb-2">Admin</p>
                <h1 th:text="${isEdit} ? 'Edit Car Model' : 'Add Car Model'">Add Car Model</h1>
            </div>
        </div>

        <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}">Error</div>

        <form th:action="${isEdit} ? @{|/admin/carmodels/${carModel.id}/edit|} : @{/admin/carmodels/new}"
              method="post"
              class="admin-form-card">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="admin-form-grid">
                <div>
                    <label for="brandId" class="form-label">Brand</label>
                    <select id="brandId" name="brandId" class="form-select" required>
                        <option value="">Select brand</option>
                        <option th:each="brand : ${brands}"
                                th:value="${brand.id}"
                                th:text="${brand.name}"
                                th:selected="${carModel.brand != null and brand.id == carModel.brand.id}">
                            BMW
                        </option>
                    </select>
                </div>

                <div>
                    <label for="name" class="form-label">Model name</label>
                    <input id="name" name="name" type="text" class="form-control" th:value="${carModel.name}" maxlength="100" required>
                </div>

                <div class="admin-form-wide">
                    <label for="imageUrl" class="form-label">Image URL</label>
                    <input id="imageUrl" name="imageUrl" type="text" class="form-control" th:value="${carModel.imageUrl}" maxlength="500">
                </div>

                <div>
                    <label for="transmission" class="form-label">Transmission</label>
                    <input id="transmission" name="transmission" type="text" class="form-control" th:value="${carModel.transmission}" maxlength="50" required>
                </div>

                <div>
                    <label for="engineConfig" class="form-label">Engine config</label>
                    <input id="engineConfig" name="engineConfig" type="text" class="form-control" th:value="${carModel.engineConfig}" maxlength="100">
                </div>

                <div>
                    <label for="engineType" class="form-label">Engine type</label>
                    <input id="engineType" name="engineType" type="text" class="form-control" th:value="${carModel.engineType}" maxlength="50" required>
                </div>

                <div>
                    <label for="horsepower" class="form-label">Horsepower</label>
                    <input id="horsepower" name="horsepower" type="number" class="form-control" th:value="${carModel.horsepower}" min="1" required>
                </div>

                <div>
                    <label for="torqueNm" class="form-label">Torque Nm</label>
                    <input id="torqueNm" name="torqueNm" type="number" class="form-control" th:value="${carModel.torqueNm}" min="1" required>
                </div>

                <div>
                    <label for="drivetrain" class="form-label">Drivetrain</label>
                    <input id="drivetrain" name="drivetrain" type="text" class="form-control" th:value="${carModel.drivetrain}" maxlength="20" required>
                </div>

                <div>
                    <label for="weightKg" class="form-label">Weight kg</label>
                    <input id="weightKg" name="weightKg" type="number" class="form-control" th:value="${carModel.weightKg}" min="1" required>
                </div>

                <div>
                    <label for="zeroToHundred" class="form-label">0-100</label>
                    <input id="zeroToHundred" name="zeroToHundred" type="number" step="0.1" class="form-control" th:value="${carModel.zeroToHundred}" min="0.1" required>
                </div>

                <div>
                    <label for="basePriceEur" class="form-label">Base price EUR</label>
                    <input id="basePriceEur" name="basePriceEur" type="number" step="0.01" class="form-control" th:value="${carModel.basePriceEur}" min="0.01" required>
                </div>
            </div>

            <div class="admin-form-actions">
                <button type="submit" class="nav-auth-button">Save model</button>
                <a th:href="@{/admin/carmodels}" class="btn btn-outline-dark">Cancel</a>
            </div>
        </form>
    </section>
</main>

<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
