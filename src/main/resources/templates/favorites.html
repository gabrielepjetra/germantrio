<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments :: head('My Favorite Cars - The German Trio')}"></head>

<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{fragments :: navbar}"></nav>

<main class="container py-5 flex-grow-1">
    <section class="favorites-page mx-auto">
        <div class="favorites-header">
            <a th:href="@{/profile}" class="btn btn-outline-dark">&larr; Back to Profile</a>

            <div class="favorites-title">
                <p class="brand-detail-label mb-2">Saved Models</p>
                <h1>My Favorite Cars</h1>
            </div>
        </div>

        <section class="profile-placeholder-card">
            <div class="profile-section-header">
                <img th:src="@{/foto/icons/saved-cars-white.png}" alt="" class="profile-section-icon">
                <h2 class="m-0">Favorite Cars</h2>
            </div>

            <p th:if="${#lists.isEmpty(favoriteCars)}">You have not saved any favorite cars yet.</p>

            <div th:unless="${#lists.isEmpty(favoriteCars)}" class="profile-favorite-grid favorites-grid">
                <article th:each="car : ${favoriteCars}" class="profile-favorite-card">
                    <div class="profile-favorite-image-wrap">
                        <img th:src="${car.imageUrl}" th:alt="${car.name}">
                    </div>

                    <div class="profile-favorite-body">
                        <p class="profile-favorite-brand" th:text="${car.brand.name}">Brand</p>
                        <h3 th:text="${car.name}">Model</h3>

                        <dl class="profile-favorite-specs">
                            <div>
                                <dt>Horsepower</dt>
                                <dd th:text="${car.horsepower} + ' HP'">0 HP</dd>
                            </div>
                            <div>
                                <dt>Base Price</dt>
                                <dd th:text="'EUR ' + ${car.basePriceEur}">EUR 0</dd>
                            </div>
                        </dl>

                        <div class="profile-favorite-actions">
                            <a th:href="@{|/carmodels/${car.id}|}" class="btn btn-outline-dark profile-favorite-details">View Details</a>

                            <form th:action="@{|/favorites/${car.id}/toggle|}" method="post" class="m-0">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button type="submit" class="car-detail-favorite-btn">
                                    <img th:src="@{/foto/icons/favorites-saved.png}" alt="Remove from favorites">
                                </button>
                            </form>
                        </div>
                    </div>
                </article>
            </div>
        </section>
    </section>
</main>

<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
