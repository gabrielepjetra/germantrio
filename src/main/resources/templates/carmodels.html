<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments :: head('All Models - The German Trio')}"></head>

<body class="d-flex flex-column min-vh-100 bg-light">

<nav th:replace="~{fragments :: navbar}"></nav>

<main class="container py-5 flex-grow-1">
  <h2 class="text-center fw-bold mb-4 text-custom">All Models</h2>
  <p class="text-center lead mb-5">Discover the current line-up of the German Trio.</p>

  <div class="table-responsive shadow-sm rounded">
    <table class="table table-bordered table-hover align-middle text-center bg-white mb-0">
      <thead class="table-dark">
      <tr>
        <th>Brand</th>
        <th>Model</th>
        <th>Horsepower (HP)</th>
        <th>Starting Price</th>
        <th>Action</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="car : ${cars}">
        <td class="fw-bold" th:text="${car.brand}"></td>
        <td th:text="${car.name}"></td>
        <td th:text="${car.horsepower} + ' HP'"></td>
        <td th:text="'€ ' + ${car.startPrice}"></td>
        <td>
          <a th:href="@{|/carmodels/${car.id}|}" class="btn btn-sm btn-outline-dark">View Details</a>
        </td>
      </tr>
      </tbody>
    </table>
  </div>
</main>

<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
