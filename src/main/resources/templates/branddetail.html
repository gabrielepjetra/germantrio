<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments :: head(${brand.name} + ' - The German Trio')}"></head>

<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{fragments :: navbar}"></nav>

<main class="container py-5 flex-grow-1">

    <div class="card mx-auto mb-5 p-4 text-center" style="max-width: 600px;">
        <img th:src="@{${brand.imgUrl}}"
             th:alt="${brand.name + ' logo'}"
             class="brand-detail-logo mx-auto mb-3">
        <h2 class="fw-bold" th:text="${brand.name}"></h2>
        <p class="text-muted-custom" th:text="${brand.shortDescription}"></p>
        <p th:text="${brand.longDescription}"></p>
        <p><strong>Flagship:</strong> <span th:text="${brand.flagship}"></span></p>
    </div>

    <section class="mb-5">
        <h4 class="text-center fw-bold text-custom mb-4">Available Models</h4>

        <div class="row g-4">
            <div class="col-12 col-md-6 col-lg-4" th:each="car : ${cars}">
                <a th:href="@{/carmodels/{id}(id=${car.id})}" class="text-decoration-none">
                    <div class="card h-100 shadow-sm model-card">
                        <img th:src="${car.imageUrl}"
                             th:alt="${car.name}"
                             class="card-img-top model-card-img">

                        <div class="card-body">
                            <h5 class="card-title fw-bold" th:text="${car.name}">
                                Model name
                            </h5>

                            <p class="card-text mb-2">
                                <span th:text="${car.horsepower}">0</span> HP
                                —
                                <span th:text="${car.transmission}">Transmission</span>
                            </p>

                            <p class="card-text mb-3">
                                From €
                                <span th:text="${car.basePriceEur}">0</span>
                            </p>

                            <div class="btn btn-view-details w-100">
                                View Details
                            </div>
                        </div>
                    </div>
                </a>
            </div>
        </div>
    </section>

</main>

<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
