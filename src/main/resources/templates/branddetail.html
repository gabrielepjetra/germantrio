<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments :: head(${brand.name} + ' - The German Trio')}"></head>

<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{fragments :: navbar}"></nav>

<main class="container py-5 flex-grow-1">

    <section class="brand-detail-hero">
        <div class="brand-detail-logo-panel">
            <img th:src="@{${brand.imgUrl}}"
                 th:alt="${brand.name + ' logo'}"
                 class="brand-detail-logo">
        </div>

        <div class="brand-detail-content">
            <p class="brand-detail-label mb-2">Brand Overview</p>
            <h1 class="brand-detail-name" th:text="${brand.name}">Brand name</h1>
            <p class="brand-detail-short" th:text="${brand.shortDescription}">Short description</p>
            <p class="brand-detail-long" th:text="${brand.longDescription}">Long description</p>

            <div class="brand-flagship">
                <span>Flagship Model</span>
                <strong th:text="${brand.flagship}">Flagship model</strong>
            </div>
        </div>
    </section>

    <section class="brand-models-section">
        <div class="brand-models-header">
            <p class="brand-detail-label mb-2">Model Lineup</p>
            <h2>Available Models</h2>
        </div>

        <div class="brand-model-grid">
            <article class="brand-model-card" th:each="car : ${cars}">
                <a th:href="@{/carmodels/{id}(id=${car.id})}" class="brand-model-link">
                    <div class="brand-model-image-wrap">
                        <img th:src="${car.imageUrl}"
                             th:alt="${car.name}"
                             class="brand-model-img">
                    </div>

                    <div class="brand-model-body">
                        <h3 th:text="${car.name}">Model name</h3>

                        <dl class="brand-model-specs">
                            <div>
                                <dt>Horsepower</dt>
                                <dd><span th:text="${car.horsepower}">0</span> HP</dd>
                            </div>
                            <div>
                                <dt>Transmission</dt>
                                <dd th:text="${car.transmission}">Transmission</dd>
                            </div>
                            <div>
                                <dt>Base Price</dt>
                                <dd>EUR <span th:text="${car.basePriceEur}">0</span></dd>
                            </div>
                        </dl>

                        <div class="btn btn-view-details w-100">View Details</div>
                    </div>
                </a>
            </article>
        </div>
    </section>

</main>

<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
